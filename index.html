<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>Bet Logger</title>
    <style>
        :root {
            --bg-base: #f2f2f7;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #333;
            --text-label: #1b4d29;
            --input-bg: #fff;
            --input-border: #e0e0e0;
            --panel-bg: #f8f9fa;
            --border-accent: #1b4d29;
        }

        /* Default Dark Mode Styles */
        body.dark-mode {
            --bg-base: #121212;
            --glass-bg: rgba(30, 30, 30, 0.95);
            --text-main: #e0e0e0;
            --text-label: #32CD32;
            --input-bg: #2c2c2c;
            --input-border: #444;
            --panel-bg: #1e1e1e;
            --border-accent: #32CD32;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }
        
        .glass-container {
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 500px;
            margin: 0 auto;
            border-top: 4px solid var(--border-accent);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
        }

        h2 { 
            text-align: left; 
            margin-top: 0; 
            margin-bottom: 20px;
            color: var(--text-label); 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--text-label);
            border: 2px solid var(--text-label);
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-panel {
            display: none; 
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid var(--text-label);
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .stat-label { font-weight: bold; color: var(--text-main); }
        .stat-value { font-weight: bold; color: var(--text-label); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: var(--text-label); }
        
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; 
            background-color: var(--input-bg);
            color: var(--text-main);
        }

        input:focus, select:focus {
            outline: none;
            border-color: #32CD32; 
            box-shadow: 0 0 8px rgba(50, 205, 50, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--input-border);
        }
        .checkbox-group input { margin-right: 10px; width: 20px; height: 20px; accent-color: #32CD32; }
        .checkbox-group label { margin-bottom: 0; font-size: 16px; color: var(--text-main);}
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: #1b4d29;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        body.dark-mode .btn-primary { background-color: #32CD32; color: #000; }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; display: none; padding: 12px; border-radius: 8px;}
        .success { color: #1b4d29; background-color: #e8f5e9; border: 1px solid #c8e6c9; }
        .error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }

        /* Style for the new toggle at the bottom */
        .sticky-options {
            margin-top: 20px;
            border-top: 1px solid var(--input-border);
            padding-top: 15px;
        }
    </style>
</head>
<body class="dark-mode"> <div class="glass-container">
        <h2>Bet Logger</h2>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌓</button>

        <button type="button" class="btn-secondary" id="dashBtn" onclick="toggleDashboard()">View Live Stats</button>
        
        <div class="stats-panel" id="statsPanel">
            <div class="stat-row"><span class="stat-label">Total P/L:</span><span class="stat-value" id="valPL">--</span></div>
            <div class="stat-row"><span class="stat-label">Total Wagered:</span><span class="stat-value" id="valWagered">--</span></div>
            <div class="stat-row"><span class="stat-label">Total ROI:</span><span class="stat-value" id="valROI">--</span></div>
            <div class="stat-row"><span class="stat-label">Record:</span><span class="stat-value" id="valRecord">--</span></div>
        </div>

        <div class="form-group">
            <label>Sportsbook</label>
            <select id="book">
                <option value="DraftKings">DraftKings</option>
                <option value="FanDuel">FanDuel</option>
                <option value="Caesars">Caesars</option>
                <option value="BetRivers">BetRivers</option>
                <option value="MGM">MGM</option>
                <option value="Bet365">Bet365</option>
                <option value="PrizePicks">PrizePicks</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>

        <div class="form-group">
            <label>Sport</label>
            <select id="sport">
                <option value="NHL">NHL</option>
                <option value="NFL">NFL</option>
                <option value="NBA">NBA</option>
                <option value="MLB">MLB</option>
                <option value="NCAAB">NCAAB</option>
                <option value="NCAAF">NCAAF</option>
                <option value="TENNIS">TENNIS</option>
                <option value="SOCCER">SOCCER</option>
                <option value="GOLF">GOLF</option>
            </select>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="parlay">
            <label for="parlay">Parlay?</label>
        </div>

        <div class="form-group">
            <label>Bet Type</label>
            <select id="betType">
                <option value="Moneyline">Moneyline</option>
                <option value="Spread">Spread</option>
                <option value="Total">Total</option>
                <option value="Prop">Prop</option>
                <option value="Future">Future</option>
                <option value="Teaser">Teaser</option>
            </select>
        </div>

        <div class="form-group">
            <label>Player / Team 1</label>
            <input type="text" id="team1" placeholder="e.g. Capitals">
        </div>

        <div class="form-group">
            <label>Team 2 (Optional)</label>
            <input type="text" id="team2" placeholder="e.g. Rangers">
        </div>

        <div class="form-group">
            <label>Details</label>
            <input type="text" id="details" placeholder="e.g. O 5.5 Goals">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Odds</label>
                <input type="number" id="odds" placeholder="-110">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Wager ($)</label>
                <input type="number" id="wager" placeholder="50" step="0.01">
            </div>
        </div>

        <div class="form-group">
            <label>Result</label>
            <select id="result">
                <option value="">Pending</option>
                <option value="W">Win (W)</option>
                <option value="L">Loss (L)</option>
                <option value="P">Push (P)</option>
            </select>
        </div>

        <button onclick="submitBet()" id="submitBtn" class="btn-primary">Log Bet to Tracker</button>
        <div id="status"></div>

        <div class="sticky-options">
            <div class="form-group checkbox-group">
                <input type="checkbox" id="keepSlip">
                <label for="keepSlip">Keep Bet In Slip</label>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzeIOm5S-PjwJloLMt-EUA66bdu6IgmL4sakY6QvuiC08nLFeQqNsNAb1jodAD-kmhk/exec"; 

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.remove('dark-mode');
            } else {
                document.body.classList.add('dark-mode');
            }
        };

        function toggleDashboard() {
            const panel = document.getElementById('statsPanel');
            const btn = document.getElementById('dashBtn');
            if (panel.style.display === "block") {
                panel.style.display = "none";
                btn.textContent = "VIEW LIVE STATS";
                return;
            }
            btn.textContent = "LOADING...";
            fetch(WEB_APP_URL)
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById('valPL').textContent = data.pl;
                    document.getElementById('valWagered').textContent = data.wagered;
                    document.getElementById('valROI').textContent = data.roi;
                    document.getElementById('valRecord').textContent = data.record;
                    document.getElementById('valPL').style.color = data.pl.includes('-') ? '#cc0000' : 'var(--text-label)';
                    panel.style.display = "block";
                    btn.textContent = "HIDE STATS";
                }
            });
        }

        function submitBet() {
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            const keepSlip = document.getElementById('keepSlip').checked;
            
            const payload = {
                book: document.getElementById('book').value,
                date: document.getElementById('date').value,
                sport: document.getElementById('sport').value,
                parlay: document.getElementById('parlay').checked,
                betType: document.getElementById('betType').value,
                team1: document.getElementById('team1').value,
                team2: document.getElementById('team2').value,
                details: document.getElementById('details').value,
                odds: parseFloat(document.getElementById('odds').value),
                wager: parseFloat(document.getElementById('wager').value),
                result: document.getElementById('result').value
            };

            if (!payload.team1 || isNaN(payload.odds) || isNaN(payload.wager)) {
                statusDiv.textContent = "Fill Team 1, Odds, and Wager.";
                statusDiv.className = "error";
                statusDiv.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "SENDING...";

            fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    statusDiv.textContent = "Bet Logged!";
                    statusDiv.className = "success";
                    
                    // Logic for keeping or clearing form
                    if (!keepSlip) {
                        document.getElementById('team1').value = "";
                        document.getElementById('team2').value = "";
                        document.getElementById('details').value = "";
                        document.getElementById('odds').value = "";
                        document.getElementById('wager').value = "";
                        document.getElementById('result').value = "";
                    }
                } else {
                    statusDiv.textContent = "Error: " + data.message;
                    statusDiv.className = "error";
                }
                statusDiv.style.display = "block";
                btn.disabled = false;
                btn.textContent = "LOG BET TO TRACKER";
            });
        }
    </script>
</body>
</html>
