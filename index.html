<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bet Logger</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* The Logo: Pure CSS Black Background with Lime Green Center Dot */
            background-color: #000000;
            background-image: radial-gradient(circle at 50% 50%, #32CD32 0, #32CD32 60px, transparent 62px);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #333;
            min-height: 100vh;
        }
        
        /* Forest Green & White Theme Container */
        .glass-container {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            max-width: 500px;
            margin: 0 auto;
            border-top: 4px solid #1b4d29; /* Forest green top border accent */
        }

        h2 { 
            text-align: center; 
            margin-top: 0; 
            color: #1b4d29; /* Forest Green */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 5px; 
            font-size: 14px; 
            color: #1b4d29; /* Forest Green */
        }
        
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; 
            background-color: #fff;
            color: #333;
            transition: all 0.2s ease;
        }

        /* Lime Green focus glow when tapping a box */
        input:focus, select:focus {
            outline: none;
            border-color: #32CD32; 
            box-shadow: 0 0 8px rgba(50, 205, 50, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        .checkbox-group input { margin-right: 10px; width: 20px; height: 20px; accent-color: #1b4d29; }
        .checkbox-group label { margin-bottom: 0; font-size: 16px; color: #333;}
        
        button {
            width: 100%;
            padding: 16px;
            background-color: #1b4d29; /* Forest Green */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(27, 77, 41, 0.3);
            transition: background-color 0.2s ease;
        }
        button:active { background-color: #11331a; }
        
        #status { text-align: center; margin-top: 15px; font-weight: bold; display: none; padding: 12px; border-radius: 8px;}
        .success { color: #1b4d29; background-color: #e8f5e9; border: 1px solid #c8e6c9; }
        .error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2>Bet Logger</h2>

        <div class="form-group">
            <label>Sportsbook</label>
            <select id="book">
                <option value="DraftKings">DraftKings</option>
                <option value="FanDuel">FanDuel</option>
                <option value="Caesars">Caesars</option>
                <option value="BetRivers">BetRivers</option>
                <option value="MGM">MGM</option>
                <option value="Bet365">Bet365</option>
                <option value="PrizePicks">PrizePicks</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" id="date">
        </div>

        <div class="form-group">
            <label>Sport</label>
            <select id="sport">
                <option value="NHL">NHL</option>
                <option value="NFL">NFL</option>
                <option value="NBA">NBA</option>
                <option value="MLB">MLB</option>
                <option value="NCAAB">NCAAB</option>
                <option value="NCAAF">NCAAF</option>
                <option value="TEN">TEN</option>
                <option value="SOCCER">SOCCER</option>
            </select>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="parlay">
            <label for="parlay">Parlay?</label>
        </div>

        <div class="form-group">
            <label>Bet Type</label>
            <select id="betType">
                <option value="Moneyline">Moneyline</option>
                <option value="Spread">Spread</option>
                <option value="Total">Total</option>
                <option value="Prop">Prop</option>
                <option value="Future">Future</option>
                <option value="Teaser">Teaser</option>
            </select>
        </div>

        <div class="form-group">
            <label>Player / Team 1</label>
            <input type="text" id="team1" placeholder="e.g. Capitals">
        </div>

        <div class="form-group">
            <label>Team 2 (Optional)</label>
            <input type="text" id="team2" placeholder="e.g. Rangers">
        </div>

        <div class="form-group">
            <label>Details</label>
            <input type="text" id="details" placeholder="e.g. O 5.5 Goals">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Odds</label>
                <input type="number" id="odds" placeholder="-110">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Wager ($)</label>
                <input type="number" id="wager" placeholder="50" step="0.01">
            </div>
        </div>

        <div class="form-group">
            <label>Result</label>
            <select id="result">
                <option value="">Pending</option>
                <option value="W">Win (W)</option>
                <option value="L">Loss (L)</option>
                <option value="P">Push (P)</option>
            </select>
        </div>

        <button onclick="submitBet()" id="submitBtn">Log Bet to Tracker</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();

        function submitBet() {
            // Live Web App URL
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzeIOm5S-PjwJloLMt-EUA66bdu6IgmL4sakY6QvuiC08nLFeQqNsNAb1jodAD-kmhk/exec"; 

            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            const payload = {
                book: document.getElementById('book').value,
                date: document.getElementById('date').value,
                sport: document.getElementById('sport').value,
                parlay: document.getElementById('parlay').checked,
                betType: document.getElementById('betType').value,
                team1: document.getElementById('team1').value,
                team2: document.getElementById('team2').value,
                details: document.getElementById('details').value,
                odds: parseFloat(document.getElementById('odds').value),
                wager: parseFloat(document.getElementById('wager').value),
                result: document.getElementById('result').value
            };

            if (!payload.team1 || isNaN(payload.odds) || isNaN(payload.wager)) {
                statusDiv.textContent = "Please fill out Team 1, Odds, and Wager.";
                statusDiv.className = "error";
                statusDiv.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "SENDING...";
            statusDiv.style.display = "none";

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    statusDiv.textContent = "Bet Logged Successfully!";
                    statusDiv.className = "success";
                    document.getElementById('team1').value = "";
                    document.getElementById('team2').value = "";
                    document.getElementById('details').value = "";
                    document.getElementById('odds').value = "";
                    document.getElementById('wager').value = "";
                    document.getElementById('result').value = "";
                } else {
                    statusDiv.textContent = "Error: " + data.message;
                    statusDiv.className = "error";
                }
                statusDiv.style.display = "block";
                btn.disabled = false;
                btn.textContent = "LOG BET TO TRACKER";
            })
            .catch(error => {
                statusDiv.textContent = "Network Error. Please try again.";
                statusDiv.className = "error";
                statusDiv.style.display = "block";
                btn.disabled = false;
                btn.textContent = "LOG BET TO TRACKER";
            });
        }
    </script>
</body>
</html>
